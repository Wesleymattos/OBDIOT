<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OBDIOT Tracker (Real Time)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }

    #vibBtn, #flashBtn {
      position: absolute;
      right: 20px;
      z-index: 9999;
      padding: 15px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      color: white;
      cursor: pointer;
    }

    #vibBtn {
      top: 20px;
      background: red;
    }

    #flashBtn {
      top: 80px;
      background: black;
    }
  </style>
</head>

<body>

<div id="map"></div>

<button id="vibBtn">VIBRADOR OFF</button>
<button id="flashBtn">LANTERNA OFF</button>

<script>
  // =========================
  // 🔥 FIREBASE INIT
  // =========================
  const firebaseConfig = {
    apiKey: "AIzaSyA4z1-kAAGh6dq6nPf3ycHYVrb-gwCJnfU",
    authDomain: "obdiot.firebaseapp.com",
    databaseURL: "https://obdiot-default-rtdb.firebaseio.com",
    projectId: "obdiot",
    storageBucket: "obdiot.firebasestorage.app",
    messagingSenderId: "409558110291",
    appId: "1:409558110291:web:a711c0a5a9e468162376a6"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();
  const auth = firebase.auth();

  // =========================
  // 🔐 AUTH (OBRIGATÓRIO)
  // =========================
  auth.signInAnonymously()
    .then(() => {
      console.log("🔥 Firebase Auth OK (anônimo)");
    })
    .catch((e) => {
      console.error("❌ Auth erro:", e);
    });

  // =========================
  // 🗺 MAPA
  // =========================
  const map = L.map('map').setView([-29.84, -50.88], 20);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  const markers = {};
  let followedUser = null;

const carIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/744/744465.png",
  iconSize: [60, 60]
});

const walkIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/1946/1946429.png",
  iconSize: [55, 55]
});

  // =========================
  // 🔥 VIBRADOR GLOBAL
  // =========================
  const vibRef = db.ref("control/vibrador");
  const vibStatusRef = db.ref("status/vibradorAtivo");

  document.getElementById("vibBtn").onclick = () => {
    vibRef.once("value").then(snap => {
      vibRef.set(!(snap.val() === true));
    });
  };

  vibStatusRef.on("value", snap => {
    const isOn = snap.val() === true;
    const btn = document.getElementById("vibBtn");

    btn.style.background = isOn ? "green" : "red";
    btn.innerText = isOn ? "VIBRADOR ON" : "VIBRADOR OFF";
  });

  // =========================
  // 👥 USERS
  // =========================
  const usersRef = db.ref("users");

  usersRef.on("child_added", snap => updateUser(snap.key, snap.val()));
  usersRef.on("child_changed", snap => updateUser(snap.key, snap.val()));

  usersRef.on("child_removed", snap => {
    const id = snap.key;
    if (markers[id]) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  });

  function toggleUser(userId) {
    const ref = db.ref("control/users/" + userId);

    ref.once("value").then(snap => {
      ref.set(!(snap.val() === true));
    });
  }
  
  function followUser(userId) {

  followedUser = userId;

  alert("Agora seguindo este usuário.");
}

  function updateUser(id, u) {
    if (!u || u.lat == null || u.lng == null) return;

    const pos = [Number(u.lat), Number(u.lng)];

    if (followedUser === id) {
        map.flyTo(pos, map.getZoom(), {
    animate: true,
    duration: 0.5
});
    }

    const icon = (u.icon === "car") ? carIcon : walkIcon;

    const popup = `
  <b>${u.name || "Sem nome"}</b><br>
  📱 ${u.model || "Desconhecido"}<br>
  ⚡ ${(u.speed || 0).toFixed(1)} km/h<br>
  🔋 ${u.battery || "?"}%<br><br>

  <button onclick="followUser('${id}')"
    style="padding:6px 10px;border:none;border-radius:6px;background:#0066ff;color:white;cursor:pointer;">
    ⚓ Seguir usuário
  </button>
`;
    if (markers[id]) {
        markers[id].setLatLng(pos);
        markers[id].setPopupContent(popup);
    } else {
        markers[id] = L.marker(pos, { icon })
            .addTo(map)
            .bindPopup(popup);
    }
}
  // =========================
  // 🔦 LANTERNA
  // =========================
  const flashRef = db.ref("control/flashlight");

  document.getElementById("flashBtn").onclick = () => {
    flashRef.once("value").then(snap => {
      flashRef.set(!(snap.val() === true));
    });
  };

  flashRef.on("value", snap => {
    const isOn = snap.val() === true;
    const btn = document.getElementById("flashBtn");

    btn.style.background = isOn ? "yellow" : "black";
    btn.style.color = isOn ? "black" : "white";
    btn.innerText = isOn ? "LANTERNA ON" : "LANTERNA OFF";
  });

</script>

</body>
</html>
