<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OBDIOT Tracker (Real Time)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }

    #vibBtn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 9999;
      padding: 15px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      background: red;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    }

    #flashBtn {
      position: absolute;
      top: 80px;
      right: 20px;
      z-index: 9999;
      padding: 15px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      background: black;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div id="map"></div>

<button id="vibBtn">VIBRADOR OFF</button>
<button id="flashBtn">LANTERNA OFF</button>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA4z1-kAAGh6dq6nPf3ycHYVrb-gwCJnfU",
    authDomain: "obdiot.firebaseapp.com",
    databaseURL: "https://obdiot-default-rtdb.firebaseio.com",
    projectId: "obdiot",
    storageBucket: "obdiot.firebasestorage.app",
    messagingSenderId: "409558110291",
    appId: "1:409558110291:web:a711c0a5a9e468162376a6"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const map = L.map('map').setView([-29.84, -50.88], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  const markers = {};

  const carIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/744/744465.png",
    iconSize: [35, 35]
  });

  const walkIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/1946/1946429.png",
    iconSize: [30, 30]
  });

  // =========================
  // 🔥 VIBRADOR GLOBAL
  // =========================
  const vibRef = db.ref("control/vibrador");
  const vibStatusRef = db.ref("status/vibradorAtivo");

  document.getElementById("vibBtn").onclick = () => {
    vibRef.once("value").then(snap => {
      vibRef.set(!!snap.val());
      vibRef.set(!snap.val());
    });
  };

  vibStatusRef.on("value", snap => {
    const isOn = snap.val();
    const btn = document.getElementById("vibBtn");

    if (isOn) {
      btn.style.background = "green";
      btn.innerText = "VIBRADOR ON";
    } else {
      btn.style.background = "red";
      btn.innerText = "VIBRADOR OFF";
    }
  });

  // =========================
  // 🎯 USUÁRIO
  // =========================
  function toggleUser(userId) {
    const ref = db.ref("control/users/" + userId);

    ref.once("value").then(snap => {
      const current = snap.val() || false;
      ref.set(!current);
    });
  }

  // =========================
  // 👥 USERS
  // =========================
  const usersRef = db.ref("users");

  usersRef.on("child_added", snap => updateUser(snap.key, snap.val()));
  usersRef.on("child_changed", snap => updateUser(snap.key, snap.val()));

  usersRef.on("child_removed", snap => {
    const id = snap.key;
    if (markers[id]) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  });

  function updateUser(id, u) {

    if (!u || u.lat == null || u.lng == null) return;

    const pos = [Number(u.lat), Number(u.lng)];

    const icon = (u.icon === "car") ? carIcon : walkIcon;

    const popup = `
      <b>${u.name || "Sem nome"}</b><br>
      📱 ${u.model || "Desconhecido"}<br>
      ⚡ ${(u.speed || 0).toFixed(1)} km/h<br>
      🔋 ${u.battery || "?"}%<br><br>

      <button onclick="toggleUser('${id}')"
        style="padding:6px 10px;border:none;border-radius:6px;background:#ff4444;color:white;cursor:pointer;">
        Vibrar este usuário
      </button>
    `;

    if (markers[id]) {
      markers[id].setLatLng(pos);
      markers[id].setPopupContent(popup);
    } else {
      markers[id] = L.marker(pos, { icon })
        .addTo(map)
        .bindPopup(popup);
    }
  }

  // =========================
  // 🔦 LANTERNA
  // =========================
  const flashRef = db.ref("control/flashlight");

  document.getElementById("flashBtn").onclick = () => {
    flashRef.once("value").then(snap => {
      flashRef.set(!snap.val());
    });
  };

  flashRef.on("value", snap => {
    const isOn = snap.val();
    const btn = document.getElementById("flashBtn");

    if (isOn) {
      btn.style.background = "yellow";
      btn.style.color = "black";
      btn.innerText = "LANTERNA ON";
    } else {
      btn.style.background = "black";
      btn.style.color = "white";
      btn.innerText = "LANTERNA OFF";
    }
  });

</script>

</body>
</html>
